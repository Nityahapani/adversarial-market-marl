site_name: adversarial-market-marl
site_description: >-
  A multi-agent reinforcement learning framework for adversarial market
  microstructure with endogenous information leakage.
site_url: https://Nityahapani.github.io/adversarial-market-marl/
repo_url: https://github.com/Nityahapani/adversarial-market-marl
repo_name: adversarial-market-marl
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - Configuration: configuration.md
  - Background:
      - Theory: theory.md
      - Agent Design: agents.md
      - Expected Results: results.md
  - API Reference:
      - Agents: api/agents.md
      - Environment: api/environment.md
      - Networks: api/networks.md
      - Training: api/training.md
      - Evaluation: api/evaluation.md
      - Utils: api/utils.md
  - Contributing: contributing.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nityahapani/adversarial-market-marl

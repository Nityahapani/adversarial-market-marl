name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dev dependencies
        run: pip install black isort flake8 mypy types-PyYAML
      - name: Black
        run: black --check --target-version py310 --line-length 100 adversarial_market tests scripts
      - name: isort
        run: isort --check-only --profile black --line-length 100 adversarial_market tests scripts
      - name: Flake8 (source)
        run: flake8 adversarial_market scripts --max-line-length=100 --ignore=E203,W503
      - name: Flake8 (tests)
        run: flake8 tests --max-line-length=100 --ignore=E203,W503,E402
      - name: mypy
        run: mypy adversarial_market --ignore-missing-imports --no-strict-optional

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run tests
        run: pytest tests/ -v --cov=adversarial_market --cov-report=xml -x
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: coverage.xml
          fail_ci_if_error: false
